name: my_flutter_web_app
description: A robust Flutter Web application to display real-time exchange rates and bank comparisons with theme support.
publish_to: 'none' # Remove this line if you intend to publish to pub.dev

version: 1.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
# Add this section to include the downloaded flags
  assets:
    - assets/flags/